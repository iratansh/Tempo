name: 'tempo_analytics'
version: '1.0.0'
config-version: 2

profile: 'tempo_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  tempo_analytics:
    +materialized: table
    staging:
      +materialized: view
      +schema: staging
    dimensions:
      +materialized: table
      +schema: analytics
    facts:
      +materialized: table
      +schema: analytics
